<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ماشین حساب سن حرفه‌ای</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/jalaali-js/dist/jalaali.min.js"></script>
</head>
<body>

<div class="card">
    <h1>Age Calculator</h1>
    <p class="subtitle">تاریخ تولد خود را وارد کنید</p>

    <div class="inputs">
        <input id="year" placeholder="سال">
        <input id="month" placeholder="ماه">
        <input id="day" placeholder="روز">
    </div>

    <button onclick="calculateAge()">محاسبه سن</button>

    <div id="result"></div>

    <button class="share" onclick="share()">اشتراک گذاری</button>
</div>

<script>
function calculateAge() {
    let y = parseInt(document.getElementById("year").value);
    let m = parseInt(document.getElementById("month").value);
    let d = parseInt(document.getElementById("day").value);

    if (!y || !m || !d) {
        document.getElementById("result").innerHTML = "لطفاً تاریخ تولد را کامل وارد کنید";
        return;
    }

    // ۱. تبدیل تاریخ شمسی ورودی به میلادی برای محاسبات دقیق روزهای زندگی
    let gregBirth = jalaali.toGregorian(y, m, d);
    let birthDate = new Date(gregBirth.gy, gregBirth.gm - 1, gregBirth.gd);
    
    let today = new Date();
    
    // ۲. محاسبه سن شمسی (برای نمایش سال و ماه و روز)
    let jToday = jalaali.toJalaali(today.getFullYear(), today.getMonth() + 1, today.getDate());
    let ageYear = jToday.jy - y;
    let ageMonth = jToday.jm - m;
    let ageDay = jToday.jd - d;

    if (ageDay < 0) { 
        ageDay += 30; 
        ageMonth--; 
    }
    if (ageMonth < 0) { 
        ageMonth += 12; 
        ageYear--; 
    }

    // ۳. محاسبه دقیق روزهای زندگی
    let diff = today - birthDate;
    let days = Math.floor(diff / (1000 * 60 * 60 * 24));
    let hours = Math.floor(diff / (1000 * 60 * 60));
    let minutes = Math.floor(diff / (1000 * 60));

    // ۴. محاسبه روز تا تولد بعدی
    let nextBirthday = new Date(today.getFullYear(), gregBirth.gm - 1, gregBirth.gd);
    if (nextBirthday < today) {
        nextBirthday.setFullYear(today.getFullYear() + 1);
    }
    let daysToBirthday = Math.ceil((nextBirthday - today) / (1000 * 60 * 60 * 24));

    document.getElementById("result").innerHTML = `
        <div class="box">سن شما: <b>${ageYear}</b> سال ${ageMonth} ماه ${ageDay} روز</div>
        <div class="box">روزهای زندگی: <b>${days}</b> روز</div>
        <div class="box">ساعت‌های زندگی: <b>${hours}</b> ساعت</div>
        <div class="box">دقیقه‌های زندگی: <b>${minutes}</b> دقیقه</div>
        <div class="box">${daysToBirthday} روز تا تولد بعدی شما مانده</div>
    `;
}

function share() {
    navigator.clipboard.writeText(window.location.href);
    alert("لینک سایت کپی شد");
}
</script>

</body>
</html>
